<html lang="en">
<head>
  <meta charset="UTF-8">

<body class="bg-white min-h-screen flex flex-col">
  <!-- Navigation -->
  <nav class="border-b border-gray-100 bg-white sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2">
          <span class="text-2xl">🐝</span>
          <span class="text-xl font-bold text-gray-900">ToolHive</span>
        </a>
        <a href="../index.html" class="text-sm text-gray-500 hover:text-primary">← Back to Tools</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 py-8 sm:py-12">
    <div class="max-w-4xl mx-auto px-4">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">📱 QR Code Generator</h1>
        <p class="text-gray-600">Create QR codes instantly from any text or URL</p>
      </div>

      <!-- Tool Area -->
      <div class="bg-gray-50 rounded-xl p-6 sm:p-8">
        <div class="max-w-xl mx-auto">
          <!-- Input -->
          <div class="mb-6">
            <label for="qrInput" class="block text-sm font-medium text-gray-700 mb-2">Enter text or URL</label>
            <input 
              type="text" 
              id="qrInput" 
              class="tool-input w-full"
              placeholder="https://example.com or any text..."
              autocomplete="off"
            >
          </div>

          <!-- Options -->
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Size</label>
              <select id="qrSize" class="w-full p-3 border border-gray-300 rounded-lg">
                <option value="128">Small (128px)</option>
                <option value="256" selected>Medium (256px)</option>
                <option value="384">Large (384px)</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Correction Level</label>
              <select id="qrCorrection" class="w-full p-3 border border-gray-300 rounded-lg">
                <option value="L">Low (7%)</option>
                <option value="M" selected>Medium (15%)</option>
                <option value="Q">Quartile (25%)</option>
                <option value="H">High (30%)</option>
              </select>
            </div>
          </div>

          <!-- Generate Button -->
          <button onclick="generateQR()" class="btn-primary w-full mb-6">Generate QR Code</button>

          <!-- QR Code Display -->
          <div id="qrcode" class="mb-6"></div>

          <!-- Download Button -->
          <button id="downloadBtn" onclick="downloadQR()" class="btn-secondary w-full hidden">
            ⬇️ Download PNG
          </button>

          <!-- Error Message -->
          <div id="errorMsg" class="hidden text-red-600 text-center mt-4"></div>
        </div>
      </div>

      <!-- Related Tools -->
      <div class="mt-12">
        <h2 class="text-xl font-semibold text-gray-900 mb-4">Try Other Tools</h2>
        <div class="related-tools">
          <a href="json-formatter.html" class="related-tool-card">
            <span class="text-xl mr-2">📋</span>
            <span>JSON Formatter</span>
          </a>
          <a href="base64.html" class="related-tool-card">
            <span class="text-xl mr-2">🔐</span>
            <span>Base64 Encoder</span>
          </a>
          <a href="password-generator.html" class="related-tool-card">
            <span class="text-xl mr-2">🔑</span>
            <span>Password Generator</span>
          </a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-100 bg-white py-6">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <p class="text-sm text-gray-500">© 2024 ToolHive. All rights reserved.</p>
    </div>
  </footer>

  <script>
    let currentQR = null;

    function generateQR() {
      const input = document.getElementById('qrInput').value.trim();
      const size = parseInt(document.getElementById('qrSize').value);
      const correction = document.getElementById('qrCorrection').value;
      const qrContainer = document.getElementById('qrcode');
      const downloadBtn = document.getElementById('downloadBtn');
      const errorMsg = document.getElementById('errorMsg');

      // Clear previous
      qrContainer.innerHTML = '';
      errorMsg.classList.add('hidden');
      downloadBtn.classList.add('hidden');

      if (!input) {
        errorMsg.textContent = 'Please enter some text or a URL';
        errorMsg.classList.remove('hidden');
        return;
      }

      try {
        currentQR = new QRCode(qrContainer, {
          text: input,
          width: size,
          height: size,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel[correction]
        });
        downloadBtn.classList.remove('hidden');
      } catch (e) {
        errorMsg.textContent = 'Error generating QR code. Text may be too long.';
        errorMsg.classList.remove('hidden');
      }
    }

    function downloadQR() {
      const img = document.querySelector('#qrcode img');
      if (img) {
        const link = document.createElement('a');
        link.download = 'toolhive-qrcode.png';
        link.href = img.src;
        link.click();
      } else {
        // Fallback for canvas
        const canvas = document.querySelector('#qrcode canvas');
        if (canvas) {
          const link = document.createElement('a');
          link.download = 'toolhive-qrcode.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        }
      }
    }

    // Generate on Enter key
    document.getElementById('qrInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') generateQR();
    });
  </script>
<script src="https://vercel.com/_next/static/chunks/web-vitals/vercel-insights.js"></script>
